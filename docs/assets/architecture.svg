<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="LangGraph checkpoints versus stores architecture">

<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#09090f"/>
    <stop offset="50%" stop-color="#14142a"/>
    <stop offset="100%" stop-color="#071b24"/>
  </linearGradient>
  <linearGradient id="checkpoint" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#7c3aed"/>
    <stop offset="100%" stop-color="#22d3ee"/>
  </linearGradient>
  <linearGradient id="store" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#10b981"/>
    <stop offset="100%" stop-color="#facc15"/>
  </linearGradient>
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
    <feMerge>
      <feMergeNode in="coloredBlur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <style>
    .title{font-family:Inter,Arial,sans-serif;font-size:34px;font-weight:800;fill:#f8fafc}
    .sub{font-family:Inter,Arial,sans-serif;font-size:16px;fill:#cbd5e1}
    .label{font-family:Inter,Arial,sans-serif;font-size:15px;font-weight:700;fill:#f8fafc}
    .small{font-family:Inter,Arial,sans-serif;font-size:13px;fill:#dbeafe}
    .tiny{font-family:Inter,Arial,sans-serif;font-size:11px;fill:#94a3b8}
    .box{rx:18;stroke:#334155;stroke-width:1.2;filter:url(#glow)}
    .arrow{stroke:#cbd5e1;stroke-width:3;fill:none;marker-end:url(#arrow)}
  </style>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#cbd5e1" />
  </marker>
</defs>

<rect width="1200" height="675" fill="url(#bg)"/>
<circle cx="1020" cy="120" r="210" fill="#22d3ee" opacity="0.08"/>
<circle cx="160" cy="560" r="260" fill="#7c3aed" opacity="0.10"/>
<text x="60" y="72" class="title">LangGraph Persistence: Two Layers</text>
<text x="60" y="104" class="sub">Config chooses the thread. Runtime context chooses the durable user namespace.</text>

<rect x="475" y="248" width="250" height="126" fill="#111827" stroke="#64748b" class="box"/>
<text x="538" y="296" class="label">LangGraph App</text>
<text x="515" y="326" class="small">nodes + state + runtime</text>

<rect x="70" y="155" width="285" height="145" fill="url(#checkpoint)" opacity="0.90" class="box"/>
<text x="110" y="205" class="label">Checkpointer</text>
<text x="110" y="235" class="small">graph state snapshots</text>
<text x="110" y="260" class="small">scoped by thread_id</text>

<rect x="70" y="375" width="285" height="145" fill="url(#checkpoint)" opacity="0.72" class="box"/>
<text x="110" y="425" class="label">Thread history</text>
<text x="110" y="455" class="small">resume / time travel</text>
<text x="110" y="480" class="small">human-in-the-loop</text>

<rect x="845" y="155" width="285" height="145" fill="url(#store)" opacity="0.90" class="box"/>
<text x="895" y="205" class="label">Store</text>
<text x="895" y="235" class="small">app-defined key-value data</text>
<text x="895" y="260" class="small">cross-thread namespaces</text>

<rect x="845" y="375" width="285" height="145" fill="url(#store)" opacity="0.72" class="box"/>
<text x="895" y="425" class="label">Durable memory</text>
<text x="895" y="455" class="small">preferences / facts</text>
<text x="895" y="480" class="small">shared knowledge</text>

<path d="M475 285 C410 250 390 230 355 225" class="arrow"/>
<path d="M355 455 C410 410 435 360 475 337" class="arrow"/>
<path d="M725 285 C790 250 810 230 845 225" class="arrow"/>
<path d="M845 455 C790 410 765 360 725 337" class="arrow"/>

<rect x="435" y="500" width="330" height="70" fill="#020617" stroke="#334155" rx="16"/>
<text x="468" y="530" class="small">configurable.thread_id → checkpoint lineage</text>
<text x="468" y="555" class="small">runtime.context.user_id → store namespace</text>
</svg>
