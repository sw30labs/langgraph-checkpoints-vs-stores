<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-label="Store cross-thread demo">

<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#09090f"/>
    <stop offset="50%" stop-color="#14142a"/>
    <stop offset="100%" stop-color="#071b24"/>
  </linearGradient>
  <linearGradient id="checkpoint" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#7c3aed"/>
    <stop offset="100%" stop-color="#22d3ee"/>
  </linearGradient>
  <linearGradient id="store" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#10b981"/>
    <stop offset="100%" stop-color="#facc15"/>
  </linearGradient>
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
    <feMerge>
      <feMergeNode in="coloredBlur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <style>
    .title{font-family:Inter,Arial,sans-serif;font-size:34px;font-weight:800;fill:#f8fafc}
    .sub{font-family:Inter,Arial,sans-serif;font-size:16px;fill:#cbd5e1}
    .label{font-family:Inter,Arial,sans-serif;font-size:15px;font-weight:700;fill:#f8fafc}
    .small{font-family:Inter,Arial,sans-serif;font-size:13px;fill:#dbeafe}
    .tiny{font-family:Inter,Arial,sans-serif;font-size:11px;fill:#94a3b8}
    .box{rx:18;stroke:#334155;stroke-width:1.2;filter:url(#glow)}
    .arrow{stroke:#cbd5e1;stroke-width:3;fill:none;marker-end:url(#arrow)}
  </style>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#cbd5e1" />
  </marker>
</defs>

<rect width="1100" height="520" fill="url(#bg)"/>
<text x="55" y="70" class="title">Store = cross-thread long-term memory</text>
<text x="55" y="102" class="sub">Same user namespace can be read from another thread.</text>

<rect x="70" y="160" width="230" height="105" fill="#064e3b" class="box"/>
<text x="105" y="202" class="label">thread-a</text>
<text x="105" y="230" class="small">put favorite_language</text>
<path d="M300 212 L430 212" class="arrow"/>
<rect x="430" y="140" width="295" height="145" fill="url(#store)" opacity="0.88" class="box"/>
<text x="470" y="190" class="label">Store namespace</text>
<text x="470" y="222" class="small">(user-ada, profile)</text>
<text x="470" y="250" class="small">favorite_language = Python</text>
<path d="M725 212 L850 212" class="arrow"/>
<rect x="850" y="160" width="210" height="105" fill="#0f172a" class="box"/>
<text x="885" y="202" class="label">thread-b</text>
<text x="885" y="230" class="small">get → Python</text>

<rect x="850" y="350" width="210" height="90" fill="#111827" stroke="#334155" class="box"/>
<text x="885" y="388" class="label">user-grace</text>
<text x="885" y="416" class="small">different namespace</text>
<path d="M725 395 L850 395" stroke="#64748b" stroke-width="3" fill="none" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
</svg>
