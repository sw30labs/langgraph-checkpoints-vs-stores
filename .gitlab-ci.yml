stages:
  - test
  - artifacts

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

.python_job:
  image: python:3.13-slim
  before_script:
    - python --version
    - python -m pip install --upgrade pip
    - python -m pip install -e ".[dev]"

lint:
  extends: .python_job
  stage: test
  script:
    - ruff check src tests scripts
    - ruff format --check src tests scripts

unit_tests:
  extends: .python_job
  stage: test
  script:
    - pytest

render_demo_artifacts:
  extends: .python_job
  stage: artifacts
  script:
    - python scripts/generate_artifacts.py
    - python -m checkpoints_vs_stores.demo all --no-color
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - artifacts/
